    <title>Designer - Home Page</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8133/8133826.png">


    <style>
    .site-branding {
        width: 100%;
        padding: 15px 0;
        text-align: center;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 0.9rem;
        position: fixed;
        bottom: 0;
        left: 0;
        backdrop-filter: blur(6px);
    }

    .site-branding p {
        margin: 0;
        letter-spacing: 0.5px;
    }
</style>
<style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .hero {
            text-align: center;
            margin-top: 80px;
            animation: fadeIn 1.5s ease;
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: #6c63ff;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #8b85ff;
            transform: translateY(-3px);
        }

        .card-container {
            margin-top: 60px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding-bottom: 60px;
        }

        .card {
            width: 260px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <header>
        <h1>Home Page</h1>
    </header>

    <section class="hero">
        <h2>Welcome to the modern world</h2>
        <p>your about to enter the future of technology</p>
        <button class="btn" onclick="window.location.href=https://unokownegamr.github.io/main page.html">
    Get Started
</button>

    </section>

    <section class="card-container">
        <div class="card">
            <h3>Fast</h3>
            <p>Optimized for speed and smooth performance.</p>
        </div>
        <div class="card">
            <h3>Modern</h3>
            <p>Clean gradients, glass effects, and animations.</p>
        </div>
        <div class="card">
            <h3>Responsive</h3>
            <p>Looks great on any device or screen size.</p>
        </div>
    </section>


<footer class="site-branding">
    <a href="https://unokownegamr.github.io/copyrights.html">© 2026 Designer — All Rights Reserved</a>
</footer></body></html>
